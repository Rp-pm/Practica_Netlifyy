<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neural Hologram System</title>
  <link rel="stylesheet" href="hologram_system.css"/>
</head>
<body>

<main class="neural-engine">

  <div class="spatial-anchor" id="anchor">

    <!-- Strat 0: Core Glow -->
    <div class="layer core-glow"></div>

    <!-- Strat 1: Glass Refracție -->
    <div class="layer glass-chassis"></div>

    <!-- Strat 2: UI + Glitch -->
    <div class="layer data-interface">
      <div class="header">SYSTEM_STATUS: ACTIVE</div>

      <h1 class="glitch-text" data-text="NEURAL_LINK">
        NEURAL_LINK
      </h1>

      <div class="stats">LATENCY: 0.002ms</div>
    </div>

    <!-- Strat 3: Orbital Node -->
    <div class="layer orbital-node">
      <div class="satellite"></div>
    </div>

    <!-- Strat 4: Specular Light -->
    <div class="layer specular-highlight"></div>

  </div>

</main>

<script src="hologram_system.js"></script>

</body>
</html>
